<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
canvas { display: block; width: 100%; height: 100%; }

#controls {
  position: fixed;
  top: 16px;
  right: 16px;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 16px 20px;
  color: #ddd;
  font-size: 13px;
  min-width: 220px;
  user-select: none;
}
#controls h3 {
  font-size: 14px;
  font-weight: 600;
  color: #fff;
  margin-bottom: 14px;
  letter-spacing: 0.5px;
}
.ctrl-group {
  margin-bottom: 12px;
}
.ctrl-group:last-child { margin-bottom: 0; }
.ctrl-group label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
  font-size: 12px;
  color: #aaa;
}
.ctrl-group label span.val {
  color: #7fdbca;
  font-weight: 500;
  font-variant-numeric: tabular-nums;
}
input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 4px;
  border-radius: 2px;
  background: rgba(255,255,255,0.12);
  outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #7fdbca;
  cursor: pointer;
  border: 2px solid rgba(0,0,0,0.3);
}
input[type="range"]::-moz-range-thumb {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #7fdbca;
  cursor: pointer;
  border: 2px solid rgba(0,0,0,0.3);
}
input[type="color"] {
  -webkit-appearance: none;
  appearance: none;
  width: 32px;
  height: 24px;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 6px;
  background: none;
  cursor: pointer;
  padding: 0;
}
input[type="color"]::-webkit-color-swatch-wrapper { padding: 2px; }
input[type="color"]::-webkit-color-swatch { border-radius: 4px; border: none; }
.color-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.color-row label {
  font-size: 12px;
  color: #aaa;
  min-width: 30px;
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="controls">
  <h3>Aurora Controls</h3>
  <div class="ctrl-group">
    <label>Intensity <span class="val" id="intensityVal">1.8</span></label>
    <input type="range" id="intensity" min="0.2" max="5.0" step="0.1" value="1.8">
  </div>
  <div class="ctrl-group">
    <label>Speed <span class="val" id="speedVal">1.0</span></label>
    <input type="range" id="speed" min="0.0" max="3.0" step="0.1" value="1.0">
  </div>
  <div class="ctrl-group">
    <label>Color</label>
    <div class="color-row">
      <label>Base</label>
      <input type="color" id="color1" value="#00ff88">
      <label>Tip</label>
      <input type="color" id="color2" value="#aa44ff">
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2');
if (!gl) { alert('WebGL2 not supported'); }

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener('resize', resize);
resize();

const vsSource = `#version 300 es
in vec2 a_position;
void main() {
  gl_Position = vec4(a_position, 0.0, 1.0);
}`;

const fsSource = `#version 300 es
precision highp float;
uniform vec2 iResolution;
uniform float iTime;
uniform vec4 iMouse;
uniform float uIntensity;
uniform float uSpeed;
uniform vec3 uColor1;
uniform vec3 uColor2;
out vec4 outColor;

#define time (iTime * uSpeed)

mat2 mm2(in float a){float c = cos(a), s = sin(a);return mat2(c,s,-s,c);}
mat2 m2 = mat2(0.95534, 0.29552, -0.29552, 0.95534);
float tri(in float x){return clamp(abs(fract(x)-.5),0.01,0.49);}
vec2 tri2(in vec2 p){return vec2(tri(p.x)+tri(p.y),tri(p.y+tri(p.x)));}

float triNoise2d(in vec2 p, float spd)
{
    float z=1.8;
    float z2=2.5;
    float rz = 0.;
    p *= mm2(p.x*0.06);
    vec2 bp = p;
    for (float i=0.; i<5.; i++ )
    {
        vec2 dg = tri2(bp*1.85)*.75;
        dg *= mm2(time*spd);
        p -= dg/z2;
        bp *= 1.3;
        z2 *= .45;
        z *= .42;
        p *= 1.21 + (rz-1.0)*.02;
        rz += tri(p.x+tri(p.y))*z;
        p*= -m2;
    }
    return clamp(1./pow(rz*29., 1.3),0.,.55);
}

float hash21(in vec2 n){ return fract(sin(dot(n, vec2(12.9898, 4.1414))) * 43758.5453); }

vec4 aurora(vec3 ro, vec3 rd)
{
    vec4 col = vec4(0);
    vec4 avgCol = vec4(0);

    for(float i=0.;i<50.;i++)
    {
        float of = 0.006*hash21(gl_FragCoord.xy)*smoothstep(0.,15., i);
        float pt = ((.8+pow(i,1.4)*.002)-ro.y)/(rd.y*2.+0.4);
        pt -= of;
        vec3 bpos = ro + pt*rd;
        vec2 p = bpos.zx;
        float rzt = triNoise2d(p, 0.06);
        vec4 col2 = vec4(0,0,0, rzt);
        float t = i / 50.0;
        vec3 auroraColor = mix(uColor1, uColor2, t);
        col2.rgb = auroraColor * (sin(1.-vec3(2.15,-.5, 1.2)+i*0.043)*0.5+0.5) * rzt;
        avgCol =  mix(avgCol, col2, .5);
        col += avgCol*exp2(-i*0.065 - 2.5)*smoothstep(0.,5., i);
    }

    col *= (clamp(rd.y*15.+.4,0.,1.));

    return col*uIntensity;
}

vec3 nmzHash33(vec3 q)
{
    uvec3 p = uvec3(ivec3(q));
    p = p*uvec3(374761393U, 1103515245U, 668265263U) + p.zxy + p.yzx;
    p = p.yzx*(p.zxy^(p >> 3U));
    return vec3(p^(p >> 16U))*(1.0/vec3(0xffffffffU));
}

vec3 stars(in vec3 p)
{
    vec3 c = vec3(0.);
    float res = iResolution.x*1.;

    for (float i=0.;i<4.;i++)
    {
        vec3 q = fract(p*(.15*res))-0.5;
        vec3 id = floor(p*(.15*res));
        vec2 rn = nmzHash33(id).xy;
        float c2 = 1.-smoothstep(0.,.6,length(q));
        c2 *= step(rn.x,.0005+i*i*0.001);
        c += c2*(mix(vec3(1.0,0.49,0.1),vec3(0.75,0.9,1.),rn.y)*0.1+0.9);
        p *= 1.3;
    }
    return c*c*.8;
}

vec3 bg(in vec3 rd)
{
    float sd = dot(normalize(vec3(-0.5, -0.6, 0.9)), rd)*0.5+0.5;
    sd = pow(sd, 5.);
    vec3 col = mix(vec3(0.05,0.1,0.2), vec3(0.1,0.05,0.2), sd);
    return col*.63;
}

// --- Water ---
float hashV(vec2 p) {
    return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
}

float vnoise(vec2 p) {
    vec2 i = floor(p);
    vec2 f = fract(p);
    f = f*f*(3.0-2.0*f);
    return mix(mix(hashV(i), hashV(i+vec2(1.0,0.0)), f.x),
               mix(hashV(i+vec2(0.0,1.0)), hashV(i+vec2(1.0,1.0)), f.x), f.y);
}

const mat2 mw = mat2(0.6, -0.8, 0.8, 0.6);

float waterFbm(vec2 p) {
    float f = 0.0;
    float t = time * 0.4;
    f += 0.5000 * vnoise(p + vec2( t*0.3, -t*0.2)); p = mw * p * 2.02;
    f += 0.2500 * vnoise(p - vec2( t*0.2,  t*0.15)); p = mw * p * 2.03;
    f += 0.1250 * vnoise(p + vec2(-t*0.15, t*0.1)); p = mw * p * 2.01;
    f += 0.0625 * vnoise(p + vec2( t*0.1, -t*0.08));
    return f / 0.9375;
}

float waterMap(vec2 pos) {
    vec2 posm = pos * mw;
    return abs(waterFbm(8.0 * posm) - 0.5) * 0.25;
}

void mainImage( out vec4 fragColor, in vec2 fragCoord )
{
    vec2 q = fragCoord.xy / iResolution.xy;
    vec2 p = q - 0.5;
    p.x*=iResolution.x/iResolution.y;

    vec3 ro = vec3(0,0,-6.7);
    vec3 rd = normalize(vec3(p,1.3));
    vec2 mo = iMouse.xy / iResolution.xy-.5;
    mo = (mo==vec2(-.5))?vec2(-0.1,0.1):mo;
    mo.x *= iResolution.x/iResolution.y;
    rd.yz *= mm2(mo.y);
    rd.xz *= mm2(mo.x + sin(iTime*0.05)*0.2);

    vec3 col = vec3(0.);
    vec3 brd = rd;
    float fade = smoothstep(0.,0.01,abs(brd.y))*0.1+0.9;

    col = bg(rd)*fade;

    if (rd.y > 0.){
        vec4 aur = smoothstep(0.,1.5,aurora(ro,rd))*fade;
        col += stars(rd);
        col = col*(1.-aur.a) + aur.rgb;
    }
    else
    {
        // Water: mirror reflection + bump ripple distortion
        float dist = ((-0.3) - ro.y) / rd.y;
        vec3 waterPos = ro + dist * rd;
        vec2 coord = waterPos.xz * 0.15;

        // Bump normal perturbation
        float bumpFactor = 0.4 * (1.0 - smoothstep(0.0, 80.0, dist));
        float eps = 0.1;
        float dx = (waterMap(coord + vec2(eps, 0.0)) - waterMap(coord - vec2(eps, 0.0))) / (2.0 * eps);
        float dz = (waterMap(coord + vec2(0.0, eps)) - waterMap(coord - vec2(0.0, eps))) / (2.0 * eps);

        // Flip ray upward (mirror) then perturb with bump
        rd.y = abs(rd.y);
        rd.x -= dx * bumpFactor;
        rd.z -= dz * bumpFactor;
        rd = normalize(rd);

        // How far below horizon (0 at horizon, 1 at straight down)
        float depth = clamp(-brd.y * 6.0, 0.0, 1.0);

        // Reflected sky + aurora (match sky branch at horizon, darken with depth)
        col = bg(rd) * fade * mix(1.0, 0.6, depth);
        vec4 aur = smoothstep(0.0, mix(1.5, 2.5, depth), aurora(ro, rd)) * fade;
        col += stars(rd) * mix(1.0, 0.1, depth);
        col = col * (1.0 - aur.a) + aur.rgb;
    }

    fragColor = vec4(col, 1.);
}

void main() {
  outColor = vec4(0.0);
  mainImage(outColor, gl_FragCoord.xy);
}
`;

function createShader(type, source) {
  const shader = gl.createShader(type);
  gl.shaderSource(shader, source);
  gl.compileShader(shader);
  if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(shader));
    gl.deleteShader(shader);
    return null;
  }
  return shader;
}

const vs = createShader(gl.VERTEX_SHADER, vsSource);
const fs = createShader(gl.FRAGMENT_SHADER, fsSource);
const program = gl.createProgram();
gl.attachShader(program, vs);
gl.attachShader(program, fs);
gl.linkProgram(program);
if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
  console.error(gl.getProgramInfoLog(program));
}
gl.useProgram(program);

const buffer = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(program, 'a_position');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const uRes = gl.getUniformLocation(program, 'iResolution');
const uTime = gl.getUniformLocation(program, 'iTime');
const uMouse = gl.getUniformLocation(program, 'iMouse');
const uIntensity = gl.getUniformLocation(program, 'uIntensity');
const uSpeed = gl.getUniformLocation(program, 'uSpeed');
const uColor1 = gl.getUniformLocation(program, 'uColor1');
const uColor2 = gl.getUniformLocation(program, 'uColor2');

// UI controls
const intensitySlider = document.getElementById('intensity');
const speedSlider = document.getElementById('speed');
const color1Input = document.getElementById('color1');
const color2Input = document.getElementById('color2');
const intensityVal = document.getElementById('intensityVal');
const speedVal = document.getElementById('speedVal');

let intensity = 1.8, speed = 1.0;
let c1 = [0, 1, 0.533], c2 = [0.667, 0.267, 1];

function hexToRGB(hex) {
  const r = parseInt(hex.slice(1,3), 16) / 255;
  const g = parseInt(hex.slice(3,5), 16) / 255;
  const b = parseInt(hex.slice(5,7), 16) / 255;
  return [r, g, b];
}

intensitySlider.addEventListener('input', e => {
  intensity = parseFloat(e.target.value);
  intensityVal.textContent = intensity.toFixed(1);
});
speedSlider.addEventListener('input', e => {
  speed = parseFloat(e.target.value);
  speedVal.textContent = speed.toFixed(1);
});
color1Input.addEventListener('input', e => { c1 = hexToRGB(e.target.value); });
color2Input.addEventListener('input', e => { c2 = hexToRGB(e.target.value); });

// Prevent canvas mouse interaction when clicking controls
document.getElementById('controls').addEventListener('mousedown', e => e.stopPropagation());

let mouseX = 0, mouseY = 0, mouseDown = false;
canvas.addEventListener('mousemove', e => {
  if (mouseDown) { mouseX = e.clientX; mouseY = canvas.height - e.clientY; }
});
canvas.addEventListener('mousedown', e => { mouseDown = true; mouseX = e.clientX; mouseY = canvas.height - e.clientY; });
canvas.addEventListener('mouseup', () => { mouseDown = false; });

const startTime = performance.now();
function render() {
  const t = (performance.now() - startTime) / 1000;
  gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.uniform1f(uTime, t);
  gl.uniform4f(uMouse, mouseX, mouseY, mouseDown ? 1 : 0, 0);
  gl.uniform1f(uIntensity, intensity);
  gl.uniform1f(uSpeed, speed);
  gl.uniform3f(uColor1, c1[0], c1[1], c1[2]);
  gl.uniform3f(uColor2, c2[0], c2[1], c2[2]);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(render);
}
render();
</script>
</body>
</html>
